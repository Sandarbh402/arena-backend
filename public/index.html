<!DOCTYPE html>
<html>
  <head>
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="room" type="text"/><button type="button"  id="join">Join Room</button>
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
<script>
  var socket = io();
  let input=document.getElementById("input")
  let room=document.getElementById("room")
  let form=document.getElementById("form");
  let join=document.getElementById("join");
  join.addEventListener('click',(e)=>{
    e.preventDefault();
    socket.emit('join room',room.value);
  })
  form.addEventListener('submit',(e)=>{
    e.preventDefault();
    let data={};
    data.text=input.value;
    data.room=room.value;
    if(input.value){
      socket.emit('chat message',data)
      input.value=''
    }
  })
  //act as receiver
  socket.on('chat message', (msg) => {
    console.log(msg);
    const item = document.createElement('li'); // Create a new list item
    item.textContent = msg; // Put the text inside it
    document.getElementById('messages').appendChild(item); // Attach it to the screen
    window.scrollTo(0, document.body.scrollHeight); // Scroll to the bottom
  });
</script>
  </body>
</html>
